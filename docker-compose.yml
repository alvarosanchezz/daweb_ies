version: '3.8'
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: daweb
      POSTGRES_USER: dawebuser
      POSTGRES_PASSWORD: dawebpass
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dawebuser -d daweb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: daweb-app:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/daweb
      SPRING_DATASOURCE_USERNAME: dawebuser
      SPRING_DATASOURCE_PASSWORD: dawebpass
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      - db
    restart: on-failure

volumes:
  db-data:
