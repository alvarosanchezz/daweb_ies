services:

  # ── Backend: Spring Boot (Docker) ──────────────────────────────────────────
  - type: web
    name: daweb-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: pro
      - key: PORT
        value: 8080

  # ── Frontend: Angular SSR (Node.js) ────────────────────────────────────────
  - type: web
    name: daweb-frontend
    runtime: node
    rootDir: daweb_frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/daweb_frontend/server/server.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
